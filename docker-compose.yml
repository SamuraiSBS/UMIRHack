services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: delivery
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d delivery"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/delivery?schema=public
      JWT_SECRET: super-secret-jwt-key-change-in-prod
      PORT: 3001
    ports:
      - '3001:3001'
    # Wait for Postgres, sync schema, seed demo data, then start server.
    command: sh -c "npx prisma db push && node prisma/seed.js && node src/index.js"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: http://backend:3001
    ports:
      - '5173:5173'

volumes:
  postgres_data:
