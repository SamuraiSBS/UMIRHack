version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: delivery
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/delivery?schema=public
      JWT_SECRET: super-secret-jwt-key-change-in-prod
      PORT: 3001
    ports:
      - '3001:3001'
    # Run migrations then start server
    command: sh -c "npx prisma migrate deploy && node src/index.js"

volumes:
  postgres_data:
